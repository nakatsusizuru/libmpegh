name: Build libmpegh (Windows x64)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup CMake + Ninja
        uses: lukka/get-cmake@latest

      - name: Setup MSVC Compiler
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure CMake (Ninja)
        shell: pwsh
        run: |
          cmake -S . -B build `
            -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DLC_LEVEL_4=ON

      - name: Build
        shell: pwsh
        run: cmake --build build --verbose

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libmpegh-windows-x64
          path: |
            build/ia_mpeghd_lib.lib
            build/ia_mpeghd_testbench.exe
          retention-days: 14

      - name: List output files
        shell: pwsh
        run: |
          echo "=== Build Output ==="
          dir build
